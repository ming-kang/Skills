<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 350" width="680" height="350" role="img">
  <title>RAG vs 微调 vs 提示工程</title>
  <desc>三种为大模型注入知识的方法对比：RAG 检索外部知识、查询时拼接，知识可更新（优势）；微调改写模型权重，成本与延迟高（局限）；提示工程用少样本示例，受上下文窗口限制（局限）。</desc>
  <style>text { font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans CJK SC', sans-serif; }</style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="680" height="350" fill="#FFFFFF"/>
  <line x1="190" y1="78" x2="265" y2="78" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="415" y1="78" x2="485" y2="78" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="190" y1="174" x2="265" y2="174" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="415" y1="174" x2="485" y2="174" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="190" y1="270" x2="265" y2="270" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="415" y1="270" x2="485" y2="270" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="40" y="50" width="150" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="265" y="50" width="150" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="485" y="50" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="40" y="146" width="150" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="265" y="146" width="150" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="485" y="146" width="150" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <rect x="40" y="242" width="150" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="265" y="242" width="150" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="485" y="242" width="150" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="115" y="70" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">RAG</text>
  <text x="115" y="87" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">检索增强生成</text>
  <text x="340" y="70" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">检索外部知识</text>
  <text x="340" y="87" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">查询时拼接</text>
  <text x="560" y="70" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">知识可更新</text>
  <text x="560" y="87" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">无需重训</text>
  <text x="115" y="166" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">微调</text>
  <text x="115" y="183" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">Fine-tuning</text>
  <text x="340" y="166" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">改写模型权重</text>
  <text x="340" y="183" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">需训练数据</text>
  <text x="560" y="166" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">成本与延迟高</text>
  <text x="560" y="183" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">更新昂贵</text>
  <text x="115" y="262" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">提示工程</text>
  <text x="115" y="279" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">Prompting</text>
  <text x="340" y="262" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">少样本示例</text>
  <text x="340" y="279" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">写在提示里</text>
  <text x="560" y="262" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">受上下文窗口限制</text>
  <text x="560" y="279" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">示例放不下</text>
  <text x="40" y="28" dominant-baseline="central" font-size="15" font-weight="600" fill="#141413">RAG vs 微调 vs 提示工程</text>
  <rect x="40" y="318" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="58" y="324" dominant-baseline="central" font-size="12" fill="#3D3D3A">优势</text>
  <rect x="108" y="318" width="12" height="12" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="126" y="324" dominant-baseline="central" font-size="12" fill="#3D3D3A">局限</text>
</svg>
