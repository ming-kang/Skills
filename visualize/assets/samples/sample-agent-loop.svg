<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" width="720" height="430" role="img">
  <title>Agent 工具调用循环</title>
  <desc>用户提问后，LLM 进行推理并决定是否调用工具；工具（搜索、代码、计算）执行后把观察结果回传给 LLM，形成循环；当 LLM 判断信息充分时，输出最终答案。</desc>
  <style>text { font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans CJK SC', sans-serif; }</style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="720" height="430" fill="#FFFFFF"/>
  <line x1="360" y1="100" x2="360" y2="140" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="360" y1="196" x2="360" y2="240" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="460" y1="268" x2="520" y2="268" stroke="#EF9F27" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M600 240 L600 168 L462 168 L460 168" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="260" y1="168" x2="200" y2="168" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="260" y="44" width="200" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="260" y="140" width="200" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="260" y="240" width="200" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="520" y="240" width="160" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <rect x="40" y="140" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="360" y="64" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">用户提问</text>
  <text x="360" y="81" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">自然语言</text>
  <text x="360" y="160" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">LLM</text>
  <text x="360" y="177" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">推理并决定</text>
  <text x="360" y="260" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">工具调用</text>
  <text x="360" y="277" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">选择并发起</text>
  <text x="600" y="260" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">工具</text>
  <text x="600" y="277" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">搜索 · 代码 · 计算</text>
  <text x="120" y="160" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">最终答案</text>
  <text x="120" y="177" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">信息充分时输出</text>
  <text x="40" y="28" dominant-baseline="central" font-size="15" font-weight="600" fill="#141413">Agent 工具调用循环</text>
  <text x="368" y="218" text-anchor="start" dominant-baseline="central" font-size="12" fill="#3D3D3A">call tool</text>
  <text x="531" y="160" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">observation</text>
  <text x="230" y="160" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">done</text>
  <rect x="40" y="392" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="58" y="398" dominant-baseline="central" font-size="12" fill="#3D3D3A">完成路径</text>
  <rect x="133" y="392" width="12" height="12" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="151" y="398" dominant-baseline="central" font-size="12" fill="#3D3D3A">工具调用</text>
  <rect x="227" y="392" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="245" y="398" dominant-baseline="central" font-size="12" fill="#3D3D3A">循环 / 反馈</text>
</svg>
