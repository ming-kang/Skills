<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" width="720" height="540" role="img">
  <title>RAG pipeline</title>
  <desc>A user query is embedded, used to retrieve top-k chunks from a vector store, then passed with the retrieved context to an LLM that produces a grounded response. The vector store is populated offline by indexing a document corpus.</desc>
  <style>text { font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans CJK SC', sans-serif; }</style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="720" height="540" fill="#FFFFFF"/>
  <rect x="500" y="56" width="200" height="252" rx="14" fill="none" stroke="rgba(31,30,29,0.3)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="520" y="82" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Knowledge base</text>
  <line x1="300" y1="100" x2="300" y2="138" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="300" y1="194" x2="300" y2="232" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="300" y1="288" x2="300" y2="326" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="300" y1="382" x2="300" y2="420" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="520" y1="260" x2="420" y2="260" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="600" y1="152" x2="600" y2="232" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="180" y="44" width="240" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="180" y="138" width="240" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="180" y="232" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="180" y="326" width="240" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="180" y="420" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="520" y="96" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <rect x="520" y="232" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="300" y="64" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">User query</text>
  <text x="300" y="81" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">natural language</text>
  <text x="300" y="158" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Embed</text>
  <text x="300" y="175" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">query → vector</text>
  <text x="300" y="252" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Retrieve</text>
  <text x="300" y="269" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">top-k similar chunks</text>
  <text x="300" y="346" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">LLM</text>
  <text x="300" y="363" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">answer from context</text>
  <text x="300" y="440" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Response</text>
  <text x="300" y="457" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">grounded answer</text>
  <text x="600" y="116" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Documents</text>
  <text x="600" y="133" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">corpus</text>
  <text x="600" y="252" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Vector store</text>
  <text x="600" y="269" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">embeddings</text>
  <text x="40" y="28" dominant-baseline="central" font-size="15" font-weight="600" fill="#141413">RAG pipeline</text>
  <text x="470" y="252" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">top-k</text>
  <text x="608" y="192" text-anchor="start" dominant-baseline="central" font-size="12" fill="#3D3D3A">index</text>
  <rect x="40" y="500" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="58" y="506" dominant-baseline="central" font-size="12" fill="#3D3D3A">Retrieval (read)</text>
  <rect x="192" y="500" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="210" y="506" dominant-baseline="central" font-size="12" fill="#3D3D3A">Index (write)</text>
</svg>
