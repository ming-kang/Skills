<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 250" width="760" height="250" role="img">
  <title>RAG pipeline</title>
  <desc>A query is embedded, used to retrieve top-k passages, then grounded by the LLM into an answer.</desc>
  <style>text { font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans CJK SC', sans-serif; }</style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="760" height="250" fill="#FFFFFF"/>
  <rect x="28" y="64" width="700" height="124" rx="14" fill="none" stroke="rgba(31,30,29,0.3)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="48" y="90" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">RAG</text>
  <text x="48" y="108" dominant-baseline="central" font-size="12" fill="#3D3D3A">retrieval-augmented generation</text>
  <line x1="160" y1="148" x2="216" y2="148" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="336" y1="148" x2="392" y2="148" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="520" y1="148" x2="576" y2="148" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="40" y="120" width="120" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="216" y="120" width="120" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="392" y="120" width="128" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="576" y="120" width="136" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="100" y="140" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">查询</text>
  <text x="100" y="157" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">用户问题</text>
  <text x="276" y="140" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Embed</text>
  <text x="276" y="157" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">to vector</text>
  <text x="456" y="140" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Retriever</text>
  <text x="456" y="157" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">top-k passages</text>
  <text x="644" y="140" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">LLM</text>
  <text x="644" y="157" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">grounded answer</text>
  <text x="364" y="140" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">vector</text>
  <text x="548" y="140" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">context</text>
  <rect x="40" y="224" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="58" y="230" dominant-baseline="central" font-size="12" fill="#3D3D3A">retrieval path</text>
  <rect x="178" y="224" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="196" y="230" dominant-baseline="central" font-size="12" fill="#3D3D3A">generation</text>
</svg>
