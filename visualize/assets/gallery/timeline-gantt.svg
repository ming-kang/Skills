<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380" role="img">
  <title>Product launch Gantt</title>
  <desc>A four-phase project timeline — design, develop, test, launch — across six weeks, with two amber milestones marking the design freeze and the public release.</desc>
  <style>text { font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans CJK SC', sans-serif; }</style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="760" height="380" fill="#FFFFFF"/>
  <line x1="80" y1="320" x2="700" y2="320" stroke="#73726C" stroke-width="1"/>
  <line x1="100" y1="316" x2="100" y2="324" stroke="#73726C" stroke-width="1"/>
  <line x1="220" y1="316" x2="220" y2="324" stroke="#73726C" stroke-width="1"/>
  <line x1="340" y1="316" x2="340" y2="324" stroke="#73726C" stroke-width="1"/>
  <line x1="460" y1="316" x2="460" y2="324" stroke="#73726C" stroke-width="1"/>
  <line x1="580" y1="316" x2="580" y2="324" stroke="#73726C" stroke-width="1"/>
  <line x1="700" y1="316" x2="700" y2="324" stroke="#73726C" stroke-width="1"/>
  <rect x="100" y="96" width="140" height="28" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="180" y="132" width="260" height="28" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <rect x="340" y="168" width="200" height="28" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <rect x="480" y="204" width="140" height="28" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <polygon points="240,254 262,270 240,286 218,270" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <polygon points="620,254 642,270 620,286 598,270" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="40" y="36" dominant-baseline="central" font-size="16" font-weight="600" fill="#141413">Product launch · 6 weeks</text>
  <text x="40" y="110" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Design</text>
  <text x="170" y="110" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Design</text>
  <text x="40" y="146" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Develop</text>
  <text x="310" y="146" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Develop</text>
  <text x="40" y="182" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Test</text>
  <text x="440" y="182" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Test</text>
  <text x="40" y="218" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Launch</text>
  <text x="550" y="218" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Launch</text>
  <text x="240" y="246" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806">Design freeze</text>
  <text x="620" y="246" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806">Public release</text>
  <text x="100" y="338" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">W1</text>
  <text x="220" y="338" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">W2</text>
  <text x="340" y="338" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">W3</text>
  <text x="460" y="338" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">W4</text>
  <text x="580" y="338" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">W5</text>
  <text x="700" y="338" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">W6</text>
  <rect x="40" y="354" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="58" y="360" dominant-baseline="central" font-size="12" fill="#3D3D3A">Design / Launch</text>
  <rect x="185" y="354" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="203" y="360" dominant-baseline="central" font-size="12" fill="#3D3D3A">Develop</text>
  <rect x="275" y="354" width="12" height="12" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="293" y="360" dominant-baseline="central" font-size="12" fill="#3D3D3A">Test / milestone</text>
</svg>
