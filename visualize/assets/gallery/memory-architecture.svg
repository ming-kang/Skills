<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 400" width="1020" height="400" role="img">
  <title>Agent memory architecture</title>
  <desc>Input is processed by a memory manager that writes to a vector store and a graph store; retrieval and ranking then assemble the context for the model.</desc>
  <style>text { font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans CJK SC', sans-serif; }</style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1020" height="400" fill="#FFFFFF"/>
  <line x1="160" y1="196" x2="240" y2="196" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M420 196 L460 196 L460 113 L500 114" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M420 196 L460 196 L460 291 L500 292" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M680 114 L705 113 L705 196 L750 196" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M680 292 L705 291 L705 196" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="40" y="168" width="120" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="240" y="168" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <path d="M 500 87 A 90 9 0 0 1 680 87 L 680 141 A 90 9 0 0 1 500 141 Z" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <ellipse cx="590" cy="87" rx="90" ry="9" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <path d="M 500 265 A 90 9 0 0 1 680 265 L 680 319 A 90 9 0 0 1 500 319 Z" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <ellipse cx="590" cy="265" rx="90" ry="9" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <rect x="750" y="168" width="152" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <text x="100" y="188" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Input</text>
  <text x="100" y="205" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">new message</text>
  <text x="330" y="188" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Memory manager</text>
  <text x="330" y="205" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">extract + route</text>
  <text x="590" y="106" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Vector store</text>
  <text x="590" y="123" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">embeddings</text>
  <text x="590" y="284" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Graph store</text>
  <text x="590" y="301" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">relations</text>
  <text x="826" y="188" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Retrieve + rank</text>
  <text x="826" y="205" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">top-k + score</text>
  <text x="200" y="188" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">write</text>
  <text x="713" y="154" text-anchor="start" dominant-baseline="central" font-size="12" fill="#3D3D3A">read</text>
  <rect x="40" y="366" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="58" y="372" dominant-baseline="central" font-size="12" fill="#3D3D3A">vector / write</text>
  <rect x="178" y="366" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="196" y="372" dominant-baseline="central" font-size="12" fill="#3D3D3A">graph</text>
  <rect x="254" y="366" width="12" height="12" rx="3" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <text x="272" y="372" dominant-baseline="central" font-size="12" fill="#3D3D3A">retrieve</text>
</svg>
