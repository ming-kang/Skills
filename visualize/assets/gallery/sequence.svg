<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="820" height="440" role="img">
  <title>OAuth2 authorization code flow</title>
  <desc>The client redirects the user to the auth server, exchanges the code for a token, then calls the resource server.</desc>
  <style>text { font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans CJK SC', sans-serif; }</style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="820" height="440" fill="#FFFFFF"/>
  <line x1="140" y1="80" x2="140" y2="400" stroke="rgba(31,30,29,0.3)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="400" y1="80" x2="400" y2="400" stroke="rgba(31,30,29,0.3)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="660" y1="80" x2="660" y2="400" stroke="rgba(31,30,29,0.3)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="140" y1="150" x2="660" y2="150" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="660" y1="200" x2="140" y2="200" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="140" y1="250" x2="400" y2="250" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="400" y1="300" x2="660" y2="300" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="660" y1="350" x2="400" y2="350" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="60" y="40" width="160" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="320" y="40" width="160" height="40" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="580" y="40" width="160" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="140" y="60" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">User</text>
  <text x="400" y="60" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Client</text>
  <text x="660" y="60" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Auth server</text>
  <text x="400" y="142" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">authorize request</text>
  <text x="400" y="192" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">login + consent</text>
  <text x="270" y="242" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">auth code</text>
  <text x="530" y="292" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">exchange code</text>
  <text x="530" y="342" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">access token</text>
</svg>
