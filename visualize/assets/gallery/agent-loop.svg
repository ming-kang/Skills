<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 980" width="1360" height="980" role="img">
  <title>Agentic coding loop — one turn, fully expanded</title>
  <desc>A single turn: intake assembles context, the model plans and routes to sandboxed tools, observations are verified and either fed back for another step or finalized into a response. Memory is read and written throughout.</desc>
  <style>text { font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans CJK SC', sans-serif; }</style>
