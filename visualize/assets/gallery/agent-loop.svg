  <text x="40" y="50" dominant-baseline="central" font-size="16" font-weight="600" fill="#141413">Agent loop · turn 7 of N</text>
  <text x="112" y="148" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">User request</text>
  <text x="112" y="165" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">task + limits</text>
  <text x="124" y="234" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Session history</text>
  <text x="124" y="251" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">prior 6 turns</text>
  <text x="116" y="320" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Repo snapshot</text>
  <text x="116" y="337" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">tree + diffs</text>
  <text x="398" y="234" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Context builder</text>
  <text x="398" y="251" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">assemble prompt</text>
  <text x="658" y="148" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Model</text>
  <text x="658" y="165" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">reason + plan step</text>
  <text x="656" y="320" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Tool router</text>
  <text x="656" y="337" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">choose one action</text>
  <text x="976" y="148" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Read file</text>
  <text x="976" y="165" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">fs read</text>
  <text x="976" y="228" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Apply edit</text>
  <text x="976" y="245" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">write patch</text>
  <text x="976" y="308" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Run shell</text>
  <text x="976" y="325" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">exec command</text>
  <text x="976" y="388" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Search</text>
  <text x="976" y="405" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">grep + embed</text>
  <text x="976" y="468" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Run tests</text>
  <text x="976" y="485" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">pytest -q</text>
  <text x="1222" y="148" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Working</text>
  <text x="1222" y="165" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">current goal</text>
  <text x="1222" y="234" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Episodic</text>
  <text x="1222" y="251" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">past actions</text>
  <text x="1226" y="320" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Semantic</text>
  <text x="1226" y="337" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">code knowledge</text>
  <text x="976" y="676" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Observation</text>
  <text x="976" y="693" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">tool output</text>
  <text x="682" y="676" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Verifier</text>
  <text x="682" y="693" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">diff + tests</text>
  <text x="390" y="676" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Patch set</text>
  <text x="390" y="693" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">staged diff</text>
  <text x="110" y="676" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Response</text>
  <text x="110" y="693" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">answer + diff</text>
  <text x="572" y="50" dominant-baseline="central" font-size="12" fill="#3D3D3A">each cell = one completed turn</text>
  <text x="527" y="191" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">prompt</text>
  <text x="665" y="242" text-anchor="start" dominant-baseline="central" font-size="12" fill="#3D3D3A">action</text>
  <text x="992" y="184" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">r/w</text>
  <text x="1050" y="612" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">observe</text>
  <text x="829" y="676" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">result</text>
  <text x="536" y="676" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">pass</text>
  <text x="548" y="352" text-anchor="start" dominant-baseline="central" font-size="12" fill="#3D3D3A">not done</text>
  <text x="40" y="912" dominant-baseline="central" font-size="12" fill="#3D3D3A">One turn shown. The terracotta edge re-enters the model with each new observation until the verifier passes; the response is then finalized and the turn counter advances.</text>
  <rect x="40" y="844" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="58" y="850" dominant-baseline="central" font-size="12" fill="#3D3D3A">primary / success</text>
  <rect x="199" y="844" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="217" y="850" dominant-baseline="central" font-size="12" fill="#3D3D3A">model reasoning</text>
  <rect x="343" y="844" width="12" height="12" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="361" y="850" dominant-baseline="central" font-size="12" fill="#3D3D3A">tool / mutation</text>
  <rect x="488" y="844" width="12" height="12" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="506" y="850" dominant-baseline="central" font-size="12" fill="#3D3D3A">feedback / retry</text>
