            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1360" height="980" fill="#FFFFFF"/>
  <rect x="28" y="72" width="232" height="320" rx="14" fill="none" stroke="rgba(31,30,29,0.3)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="48" y="98" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">1 · Intake</text>
  <text x="48" y="116" dominant-baseline="central" font-size="12" fill="#3D3D3A">all the model sees</text>
  <rect x="548" y="72" width="300" height="320" rx="14" fill="none" stroke="rgba(31,30,29,0.3)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="568" y="98" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">2 · Reasoning</text>
  <text x="568" y="116" dominant-baseline="central" font-size="12" fill="#3D3D3A">plan the next action</text>
  <rect x="896" y="72" width="232" height="452" rx="14" fill="none" stroke="rgba(31,30,29,0.3)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="916" y="98" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">3 · Tools</text>
  <text x="916" y="116" dominant-baseline="central" font-size="12" fill="#3D3D3A">sandboxed</text>
  <rect x="1148" y="72" width="184" height="320" rx="14" fill="none" stroke="rgba(31,30,29,0.3)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="1168" y="98" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Memory</text>
  <text x="1168" y="116" dominant-baseline="central" font-size="12" fill="#3D3D3A">read + write</text>
  <rect x="28" y="600" width="1100" height="200" rx="14" fill="none" stroke="rgba(31,30,29,0.3)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="48" y="626" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">4 · Verify &amp; finalize</text>
  <text x="48" y="644" dominant-baseline="central" font-size="12" fill="#3D3D3A">loop or answer</text>
