  <rect x="590" y="120" width="150" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="590" y="300" width="150" height="40" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <rect x="120" y="300" width="150" height="40" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
