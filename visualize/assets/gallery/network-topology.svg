<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" width="760" height="440" role="img">
  <title>Three-tier network topology</title>
  <desc>Internet traffic passes a firewall into a DMZ core switch serving two app servers.</desc>
  <style>text { font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans CJK SC', sans-serif; }</style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="760" height="440" fill="#FFFFFF"/>
  <rect x="180" y="150" width="400" height="200" rx="14" fill="none" stroke="rgba(31,30,29,0.3)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="200" y="176" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">DMZ</text>
  <text x="200" y="194" dominant-baseline="central" font-size="12" fill="#3D3D3A">demilitarized zone</text>
  <line x1="370" y1="96" x2="374" y2="120" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="374" y1="176" x2="380" y2="200" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M380 256 L380 260 L274 260 L274 290" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M380 256 L380 260 L494 260 L494 290" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="310" y="40" width="120" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="310" y="120" width="128" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <rect x="290" y="200" width="180" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="210" y="290" width="128" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <rect x="430" y="290" width="128" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="370" y="60" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Internet</text>
  <text x="370" y="77" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">public WAN</text>
  <text x="374" y="140" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Firewall</text>
  <text x="374" y="157" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">ingress filter</text>
  <text x="380" y="220" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Core switch</text>
  <text x="380" y="237" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">L3 routing</text>
  <text x="274" y="310" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">App server A</text>
  <text x="274" y="327" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">10.0.1.10</text>
  <text x="494" y="310" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">App server B</text>
  <text x="494" y="327" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">10.0.1.11</text>
  <text x="380" y="108" text-anchor="start" dominant-baseline="central" font-size="12" fill="#3D3D3A">HTTPS</text>
  <rect x="40" y="414" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="58" y="420" dominant-baseline="central" font-size="12" fill="#3D3D3A">external</text>
  <rect x="137" y="414" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="155" y="420" dominant-baseline="central" font-size="12" fill="#3D3D3A">internal hosts</text>
</svg>
