<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" width="760" height="470" role="img">
  <title>Microservice architecture</title>
  <desc>Client traffic enters through an API gateway, fans out to three services, which persist to a relational store and a cache.</desc>
  <style>text { font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans CJK SC', sans-serif; }</style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="760" height="470" fill="#FFFFFF"/>
  <rect x="40" y="206" width="680" height="118" rx="14" fill="none" stroke="rgba(31,30,29,0.3)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="60" y="232" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Services</text>
  <line x1="350" y1="96" x2="354" y2="130" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M354 186 L380 216 L160 216 L134 240" fill="none" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M354 186 L380 216 L358 240" fill="none" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M354 186 L380 216 L600 216 L586 240" fill="none" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M134 296 L160 352 L260 352 L260 372" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M358 296 L380 352 L260 352" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M586 296 L600 352 L500 352 L500 372" fill="none" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="290" y="40" width="120" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="290" y="130" width="128" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="70" y="240" width="128" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="290" y="240" width="136" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="510" y="240" width="152" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <path d="M 170 381 A 90 9 0 0 1 350 381 L 350 435 A 90 9 0 0 1 170 435 Z" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <ellipse cx="260" cy="381" rx="90" ry="9" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <path d="M 420 381 A 80 9 0 0 1 580 381 L 580 435 A 80 9 0 0 1 420 435 Z" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <ellipse cx="500" cy="381" rx="80" ry="9" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="350" y="60" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Client</text>
  <text x="350" y="77" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">web + mobile</text>
  <text x="354" y="150" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">API gateway</text>
  <text x="354" y="167" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">routing + auth</text>
  <text x="134" y="260" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">User service</text>
  <text x="134" y="277" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">accounts</text>
  <text x="358" y="260" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Order service</text>
  <text x="358" y="277" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">checkout</text>
  <text x="586" y="260" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Payment service</text>
  <text x="586" y="277" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">billing</text>
  <text x="260" y="400" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">PostgreSQL</text>
  <text x="260" y="417" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">orders + users</text>
  <text x="500" y="400" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Redis</text>
  <text x="500" y="417" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">session cache</text>
</svg>
