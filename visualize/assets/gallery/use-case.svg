<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480" role="img">
  <title>E-commerce use cases</title>
  <desc>Customer and Admin actors interact with five system use cases. Place order includes Process payment; Apply discount extends Place order. Relationships use the single open-chevron marker; &lt;&lt;include&gt;&gt; / &lt;&lt;extend&gt;&gt; are dashed with labels and routed around the ellipse obstacles.</desc>
  <style>text { font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans CJK SC', sans-serif; }</style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="760" height="480" fill="#FFFFFF"/>
  <rect x="150" y="60" width="480" height="380" rx="14" fill="none" stroke="rgba(31,30,29,0.3)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="170" y="86" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">E-commerce System</text>
  <text x="170" y="104" dominant-baseline="central" font-size="12" fill="#3D3D3A">online store</text>
  <path d="M100 232 L150 232 L150 140 L200 140" fill="none" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M100 232 L150 232 L150 250 L200 250" fill="none" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M660 232 L610 232 L610 140 L580 140" fill="none" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M660 232 L610 232 L610 360 L564 360" fill="none" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="340" y1="250" x2="420" y2="250" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <path d="M492 330 L492 300 L270 300 L270 280" fill="none" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <g stroke="#73726C" stroke-width="1.5" fill="none" stroke-linecap="round">
    <circle cx="80" cy="208" r="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
    <line x1="80" y1="216" x2="80" y2="240"/>
    <line x1="69" y1="222" x2="91" y2="222"/>
    <line x1="80" y1="240" x2="72" y2="254"/>
    <line x1="80" y1="240" x2="88" y2="254"/>
  </g>
  <g stroke="#7F77DD" stroke-width="1.5" fill="none" stroke-linecap="round">
    <circle cx="680" cy="208" r="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <line x1="680" y1="216" x2="680" y2="240"/>
    <line x1="669" y1="222" x2="691" y2="222"/>
    <line x1="680" y1="240" x2="672" y2="254"/>
    <line x1="680" y1="240" x2="688" y2="254"/>
  </g>
  <ellipse cx="276" cy="140" rx="76" ry="30" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <ellipse cx="270" cy="250" rx="70" ry="30" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <ellipse cx="496" cy="250" rx="76" ry="30" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <ellipse cx="500" cy="140" rx="80" ry="30" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <ellipse cx="492" cy="360" rx="72" ry="30" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="80" y="268" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Customer</text>
  <text x="680" y="268" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Admin</text>
  <text x="276" y="140" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Browse products</text>
  <text x="270" y="250" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Place order</text>
  <text x="496" y="250" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Process payment</text>
  <text x="500" y="140" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Manage inventory</text>
  <text x="492" y="360" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Apply discount</text>
  <text x="380" y="240" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">&lt;&lt;include&gt;&gt;</text>
  <text x="381" y="292" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">&lt;&lt;extend&gt;&gt;</text>
  <rect x="40" y="454" width="12" height="12" rx="3" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <text x="58" y="460" dominant-baseline="central" font-size="12" fill="#3D3D3A">Customer / use case</text>
  <rect x="212" y="454" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="230" y="460" dominant-baseline="central" font-size="12" fill="#3D3D3A">Admin</text>
  <rect x="289" y="454" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="307" y="460" dominant-baseline="central" font-size="12" fill="#3D3D3A">primary use case</text>
  <rect x="440" y="454" width="12" height="12" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="458" y="460" dominant-baseline="central" font-size="12" fill="#3D3D3A">optional extension</text>
</svg>
