<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480" role="img">
  <title>Animal class hierarchy</title>
  <desc>An abstract Animal class with subclasses Dog and Cat, implementing the Comparable interface. UML relationships are expressed House-style — the single open-chevron marker plus a label and line style, never per-relation arrowheads.</desc>
  <style>text { font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans CJK SC', sans-serif; }</style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="760" height="480" fill="#FFFFFF"/>
  <line x1="380" y1="190" x2="380" y2="132" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <path d="M200 370 L200 340 L380 340 L380 308" fill="none" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M560 370 L560 340 L380 340 L380 308" fill="none" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="300" y="40" width="160" height="92" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <line x1="300" y1="80" x2="460" y2="80" stroke="#0F6E56" stroke-width="0.5"/>
  <line x1="300" y1="106" x2="460" y2="106" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="300" y="190" width="160" height="118" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <line x1="300" y1="220" x2="460" y2="220" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <line x1="300" y1="264" x2="460" y2="264" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="120" y="370" width="160" height="82" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <line x1="120" y1="400" x2="280" y2="400" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <line x1="120" y1="426" x2="280" y2="426" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="480" y="370" width="160" height="82" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <line x1="480" y1="400" x2="640" y2="400" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <line x1="480" y1="426" x2="640" y2="426" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <text x="380" y="52" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">&lt;&lt;interface&gt;&gt;</text>
  <text x="380" y="65" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Comparable</text>
  <text x="312" y="120" dominant-baseline="central" font-size="12" fill="#0F6E56">+compareTo(o): int</text>
  <text x="380" y="205" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" font-style="italic" fill="#141413">Animal</text>
  <text x="312" y="234" dominant-baseline="central" font-size="12" fill="#3D3D3A">-name: String</text>
  <text x="312" y="252" dominant-baseline="central" font-size="12" fill="#3D3D3A">#age: int</text>
  <text x="312" y="278" dominant-baseline="central" font-size="12" fill="#3D3D3A">+eat(): void</text>
  <text x="312" y="296" dominant-baseline="central" font-size="12" fill="#3D3D3A">+sleep(): void</text>
  <text x="200" y="385" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Dog</text>
  <text x="132" y="414" dominant-baseline="central" font-size="12" fill="#3D3D3A">-trick: String</text>
  <text x="132" y="440" dominant-baseline="central" font-size="12" fill="#3D3D3A">+bark(): void</text>
  <text x="560" y="385" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Cat</text>
  <text x="492" y="414" dominant-baseline="central" font-size="12" fill="#3D3D3A">-indoor: bool</text>
  <text x="492" y="440" dominant-baseline="central" font-size="12" fill="#3D3D3A">+meow(): void</text>
  <text x="394" y="161" dominant-baseline="central" font-size="12" fill="#3D3D3A">&lt;&lt;implements&gt;&gt;</text>
  <text x="290" y="332" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">extends</text>
  <rect x="40" y="454" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="58" y="460" dominant-baseline="central" font-size="12" fill="#3D3D3A">interface</text>
  <rect x="144" y="454" width="12" height="12" rx="3" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <text x="162" y="460" dominant-baseline="central" font-size="12" fill="#3D3D3A">abstract / concrete class</text>
</svg>
