<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 230" width="880" height="230" role="img">
  <title>Streaming data pipeline</title>
  <desc>Events stream from Kafka through Spark into S3, then are queried by Athena. Each arrow is labeled with its data shape.</desc>
  <style>text { font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans CJK SC', sans-serif; }</style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="880" height="230" fill="#FFFFFF"/>
  <line x1="160" y1="118" x2="250" y2="118" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="370" y1="118" x2="460" y2="118" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="610" y1="118" x2="670" y2="118" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="40" y="90" width="120" height="56" rx="8" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <rect x="250" y="90" width="120" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <path d="M 460 91 A 75 9 0 0 1 610 91 L 610 145 A 75 9 0 0 1 460 145 Z" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <ellipse cx="535" cy="91" rx="75" ry="9" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="670" y="90" width="120" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="100" y="110" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#141413">Kafka</text>
  <text x="100" y="127" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">event stream</text>
  <text x="310" y="110" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Spark</text>
  <text x="310" y="127" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">transform</text>
  <text x="535" y="110" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">S3</text>
  <text x="535" y="127" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">parquet</text>
  <text x="730" y="110" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Athena</text>
  <text x="730" y="127" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">SQL query</text>
  <text x="205" y="110" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">stream</text>
  <text x="415" y="110" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">batch</text>
  <text x="640" y="110" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3D3D3A">query</text>
  <rect x="40" y="194" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="58" y="200" dominant-baseline="central" font-size="12" fill="#3D3D3A">write path</text>
  <rect x="151" y="194" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="169" y="200" dominant-baseline="central" font-size="12" fill="#3D3D3A">read path</text>
  <rect x="254" y="194" width="12" height="12" rx="3" fill="#F5F4ED" stroke="rgba(31,30,29,0.3)" stroke-width="0.5"/>
  <text x="272" y="200" dominant-baseline="central" font-size="12" fill="#3D3D3A">ingest</text>
</svg>
